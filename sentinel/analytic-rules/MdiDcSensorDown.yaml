id: 3d14f6a7-8c0b-4d2f-e5a7-1b0c3f8d6e0b
name: MDE MDI DC sensor down
description: |
  A Defender for Identity domain controller sensor stopped reporting. Identity threat detection gap.
severity: High
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562
query: |
  MDE_Drift_P5Identity(2d, 1h) | where StreamName == "MDE_DCCoverage_CL" | where FieldName == "hasSensor" and OldValue == "true" and NewValue == "false"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
