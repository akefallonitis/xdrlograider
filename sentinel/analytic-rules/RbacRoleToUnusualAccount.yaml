id: 0ae1c3d4-5f78-4a9c-b2d4-8e7f0c5a3b08
name: MDE RBAC role to unusual account
description: |
  A Defender unified-RBAC role was assigned to a new principal. Alerts on "who got a new role" — not on every role-definition tweak.

  Suggested operator response:
    1. Confirm the principalId resolves to a known and sanctioned admin account.
    2. If unknown: cross-reference SigninLogs and recent privilege grants for related activity.
    3. If sanctioned: suppress this principal for 30 days via the rule's suppression settings.
severity: High
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - PrivilegeEscalation
  - Persistence
relevantTechniques:
  - T1078
query: |
  MDE_Drift_P2Governance(7d, 1d)
  | where StreamName == "MDE_UnifiedRbacRoles_CL"
  | where ChangeType == "Added"
  | where FieldName == "principalId" or FieldName == "principalName"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
