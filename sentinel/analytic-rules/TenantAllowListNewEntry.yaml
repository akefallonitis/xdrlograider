id: e8c9a1b2-3d56-4e7a-f0b2-6c5d8a3e1f06
name: MDE tenant allow-list new entry
description: |
  A new URL, IP, file hash, or sender was added to the Defender tenant allow-list, bypassing blocks.
severity: Medium
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562
query: |
  MDE_Drift_Configuration(2h, 15m) | where StreamName == "MDE_TenantAllowBlock_CL" | where ChangeType == "Added"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
