id: c6a7e9f0-1b34-4c5e-d8f0-4a3b6e1c9d04
name: MDE PUA protection disabled
description: |
  Defender Potentially Unwanted Application protection was disabled tenant-wide.
severity: High
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562.001
query: |
  MDE_Drift_Inventory(2h, 15m) | where StreamName == "MDE_PUAConfig_CL" | where FieldName == "enabled" and NewValue == "false"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
