id: 7b58d0e1-2a4f-4b6d-c9e1-5f4a7d2b0c0f
name: MDE portal config change outside business hours
description: |
  A tenant-configuration change was made outside 0900-1700 local time.
severity: Low
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562
query: |
  union (MDE_Drift_P0Compliance(2h, 15m)), (MDE_Drift_P1Pipeline(1h, 10m)), (MDE_Drift_P2Governance(7d, 1d)) | extend HourOfDay = datetime_part("Hour", TimeGenerated) | where HourOfDay < 9 or HourOfDay >= 17
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
