id: 5f36b8c9-0e2d-4f4b-a7c9-3d2e5b0f8a0d
name: MDE streaming API new target
description: |
  A new Event Hub or Storage target was configured for Defender telemetry streaming. Possible exfiltration channel.

  Note: Microsoft has signaled the upstream streaming-API endpoint may be retired in favor of newer Defender XDR streaming feeds. Heartbeat diagnostics surface 403/404 if the endpoint becomes unreachable. See docs/STREAMS.md for current endpoint-availability tracking.
severity: Medium
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Exfiltration
relevantTechniques:
  - T1537
query: |
  MDE_Drift_Maintenance(1h, 10m) | where StreamName == "MDE_StreamingApiConfig_CL" | where ChangeType == "Added"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
