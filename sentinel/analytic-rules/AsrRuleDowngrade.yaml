id: 3c2b0e1a-6d44-4c3b-8f17-5a2d1e9b4c01
name: MDE ASR rule downgrade
description: |
  A Defender ASR rule was moved from Block to Audit or Off, reducing attack surface protection.
severity: High
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562.001
query: |
  MDE_Drift_P0Compliance(2h, 15m) | where StreamName == "MDE_AsrRulesConfig_CL" | where FieldName == "mode" | where OldValue == "Block" and NewValue in ("Audit", "Off")
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
