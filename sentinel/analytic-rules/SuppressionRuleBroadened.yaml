id: f9d0b2c3-4e67-4f8b-a1c3-7d6e9b4f2a07
name: MDE suppression rule broadened
description: |
  An existing alert suppression rule had its scope widened — may silence legitimate alerts.
severity: Medium
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562.006
query: |
  MDE_Drift_P0Compliance(2h, 15m) | where StreamName == "MDE_SuppressionRules_CL" | where ChangeType == "Modified" | where FieldName in ("scope","conditions","machineGroup")
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
