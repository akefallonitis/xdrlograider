id: a4e5c7f8-9b12-4a3c-b6d8-2e1f4c9a7b02
name: MDE Live Response unsigned scripts enabled
description: |
  The Defender Live Response unsigned-scripts policy was enabled tenant-wide. This allows arbitrary scripts to run on managed endpoints without code signing.
severity: High
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
  - Execution
relevantTechniques:
  - T1562.001
query: |
  MDE_Drift_P0Compliance(2h, 15m) | where StreamName == "MDE_LiveResponseConfig_CL" | where FieldName == "allowUnsignedScripts" and NewValue == "true"
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
