id: 4e25a7b8-9d1c-4e3a-f6b8-2c1d4a9e7f0c
name: MDE alert tuning broadened
description: |
  An alert tuning rule was widened — may hide genuine alerts from analysts.
severity: Medium
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562.006
query: |
  MDE_Drift_P0Compliance(2h, 15m) | where StreamName == "MDE_AlertTuning_CL" | where ChangeType == "Modified" | where FieldName in ("conditions","scope")
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
