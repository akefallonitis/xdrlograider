id: 9f3e2c1d-5a8b-4c2d-9f0e-7d4a6b8c1e2f
name: "[XdrOps] XdrLogRaider service account anomalous sign-in"
description: |
  The XdrLogRaider service account (UPN parameter $(SERVICE_ACCOUNT_UPN)) has
  signed in from an anomalous location/IP/device or is being targeted by
  credential-stuffing.

  Service account = connector security boundary. Even though XdrLogRaider grants
  Defender XDR READER, sign-in compromise = data exfil risk.

  Operator MUST enable post-deploy (ships disabled). UPN bound at ARM deploy
  via SERVICE_ACCOUNT_UPN parameter. Detects: new country/IP not in 30d baseline;
  sign-in outside poll cadence; failed-then-success (cred stuffing); MFA bypass.
  Triage: docs/RUNBOOK.md.
severity: High
enabled: false
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
queryFrequency: 30m
queryPeriod: 14d  # Sentinel API max is P14D; longer baselines via separate workbook
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - CredentialAccess
relevantTechniques:
  - T1078
  - T1110
query: |
  // PARAMETER: $(SERVICE_ACCOUNT_UPN) — bound at ARM deploy time from
  // mainTemplate.json deployment parameter. Operator MUST set this in
  // createUiDefinition wizard step 2 (auth setup).
  let serviceAccountUpn = "$(SERVICE_ACCOUNT_UPN)";
  let baselineWindow = 14d;  // Sentinel queryPeriod max is P14D
  let detectionWindow = 30m;
  // Establish 30-day baseline of countries + IPs the SA normally signs in from
  let baseline = SigninLogs
  | where TimeGenerated > ago(baselineWindow) and TimeGenerated < ago(detectionWindow)
  | where UserPrincipalName =~ serviceAccountUpn
  | where ResultType == 0  // successful sign-ins only
  | summarize KnownCountries = make_set(LocationDetails.countryOrRegion),
              KnownIPs       = make_set(IPAddress);
  // Detect anomalies in the last 30 minutes
  SigninLogs
  | where TimeGenerated > ago(detectionWindow)
  | where UserPrincipalName =~ serviceAccountUpn
  | extend Country  = tostring(LocationDetails.countryOrRegion)
  | extend FailureSignals = case(
      ResultType != 0,                                                     "AuthFail-or-MfaChallengeBypass",
      Country !in (toscalar(baseline | project KnownCountries)),           "AnomalousCountry",
      IPAddress !in (toscalar(baseline | project KnownIPs)),               "AnomalousIP",
      ""
  )
  | where FailureSignals != ""
  | project TimeGenerated, UserPrincipalName, IPAddress, Country, AppDisplayName,
            ResultType, ResultDescription, FailureSignals
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: UserPrincipalName
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress
eventGroupingSettings:
  aggregationKind: AlertPerResult
suppressionEnabled: true
suppressionDuration: PT1H
