id: 2c03e5f6-7b9a-4c1e-d4f6-0a9b2e7c5d0a
name: MDE XSPM path to critical asset
description: |
  An attack path terminates at a device tagged Critical. Immediate remediation candidate.
  NOTE: In v1.0.2 MDE_XspmAttackPaths_CL is deferred (POST_BODY_UNKNOWN). The rule is
  deployed + enabled but stays dormant until the operator un-defers the stream
  in endpoints.manifest.psd1 (requires HAR capture of the POST body from the
  Attack Surface Map page).
severity: High
enabled: false  # Sentinel Solution best practice — customer enables per-rule after reviewing query + threshold
requiredDataConnectors:
  - connectorId: XdrLogRaiderInternal
    dataTypes:
      - MDE_Heartbeat_CL
queryFrequency: 15m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
  - LateralMovement
relevantTechniques:
  - T1595
  - T1570
query: |
  MDE_XspmAttackPaths_CL | summarize arg_max(TimeGenerated, *) by EntityId | extend TargetCriticality = tostring(parse_json(RawJson).targetCriticality) | where TargetCriticality == "Critical" | where TimeGenerated > ago(1h)
entityMappings: []
eventGroupingSettings:
  aggregationKind: SingleAlert
suppressionEnabled: false
suppressionDuration: PT5H
