# XdrLogRaider — Connector Health workbook (Phase F.1 / B6).
#
# Operator-facing single-pane dashboard for connector health. 6 panels:
#   1. Per-capability poll freshness (last vs cadence threshold)
#   2. Auth chain failures over time
#   3. DLQ depth + oldest-entry age
#   4. Freshness SLI per stream (p95 row age)
#   5. Per-stream partial-success rate
#   6. Service account sign-in activity (uses $(SERVICE_ACCOUNT_UPN) parameter)
#
# Per directives 13 + 38 + B6 in .claude/plans/immutable-splashing-waffle.md.
# Pairs with 4 ops analytic rules:
#   - XdrOps-ConnectorStaleStream     (B7)
#   - XdrOps-AuthChainFailure         (B8)
#   - XdrOps-DlqDepthAlert            (B5)
#   - XdrOps-ServiceAccountAnomalousSignIn (B4-new)

name: XdrLogRaider — Connector Health
