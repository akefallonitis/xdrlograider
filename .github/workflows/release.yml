name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Install Bicep
        shell: pwsh
        run: az bicep install

      - name: Gate — lint + unit + validate must pass
        shell: pwsh
        run: |
          # Lint each tree individually — older PSScriptAnalyzer versions on
          # the Ubuntu runner reject -Path with a string array. Loop + accumulate.
          $allFindings = @()
          foreach ($p in @('./src', './tools', './tests')) {
              $allFindings += Invoke-ScriptAnalyzer -Path $p -Recurse -Settings './.config/PSScriptAnalyzerSettings.psd1'
          }
          $errs = $allFindings | Where-Object Severity -eq 'Error'
          if ($errs) {
              $errs | Format-Table -AutoSize
              throw "PSScriptAnalyzer errors — release aborted"
          }

          # Use the proven Run-Tests.ps1 driver (identical to CI + local).
          pwsh -NoProfile -File ./tests/Run-Tests.ps1 -Category all-offline
          if ($LASTEXITCODE -ne 0) { throw "Offline gate failed (exit $LASTEXITCODE)" }

      - name: Compile Bicep → ARM (syntax check only, scratch path)
        shell: pwsh
        run: |
          # Compile to scratch path — we ship the hand-authored ARM in
          # deploy/compiled/mainTemplate.json, NOT a Bicep-generated variant
          # (Bicep emits nested-modules ARM that breaks our committed Pester tests).
          if (Test-Path ./deploy/main.bicep) {
              $scratch = Join-Path $env:RUNNER_TEMP 'mainTemplate.from-bicep.json'
              az bicep build --file ./deploy/main.bicep --outfile $scratch
              Write-Host "OK: Bicep syntax check passed — committed mainTemplate.json is the release artefact" -ForegroundColor Green
          } else {
              Write-Host "WARN: No deploy/main.bicep" -ForegroundColor Yellow
          }

      - name: Build Sentinel content ARM (sentinelContent.json)
        shell: pwsh
        run: |
          pwsh -File ./tools/Build-SentinelContent.ps1
          if (-not (Test-Path ./deploy/compiled/sentinelContent.json)) {
              throw "Build-SentinelContent.ps1 did not produce sentinelContent.json"
          }
          Write-Host "✓ Sentinel content built" -ForegroundColor Green

      - name: Build Sentinel Solution package
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from tag (v1.0.0 → 1.0.0)
          $version = $env:VERSION -replace '^v', ''
          pwsh -File ./tools/Build-SentinelSolution.ps1 -Version $version
          $zipPath = "./deploy/solution-staging/XdrLogRaider/Package/$version.zip"
          if (-not (Test-Path $zipPath)) {
              throw "Build-SentinelSolution.ps1 did not produce $zipPath"
          }
          Write-Host "✓ Solution package built: $zipPath" -ForegroundColor Green

      - name: Build Function App ZIP
        shell: pwsh
        run: |
          # Ubuntu pwsh does NOT glob-expand `-Path *` inside Compress-Archive;
          # it treats the literal star as a filename and silently produces a
          # 9-byte (empty header) zip. Resolve the file list ourselves.
          $srcItems = Get-ChildItem -Path ./src -Exclude 'local.settings.json' |
              Select-Object -ExpandProperty FullName
          if (-not $srcItems) { throw "No files found under ./src — aborting zip build" }

          # Compress-Archive preserves the paths RELATIVE to $PWD. To get the
          # intended structure (files/folders at the ROOT of the zip, not
          # nested under src/), invoke from inside ./src.
          Push-Location ./src
          $relItems = Get-ChildItem -Exclude 'local.settings.json' |
              Select-Object -ExpandProperty Name
          Compress-Archive -Path $relItems -DestinationPath ../function-app.zip -Force
          Pop-Location

          $size = (Get-Item ./function-app.zip).Length
          if ($size -lt 10000) {
              throw "function-app.zip is only $size bytes — Compress-Archive didn't pick up src contents. Aborting."
          }
          Write-Host "function-app.zip: $([int]($size / 1024)) KB" -ForegroundColor Green

          # Sanity-check the zip contains profile.ps1 + host.json + Modules/
          $entries = [IO.Compression.ZipFile]::OpenRead((Resolve-Path ./function-app.zip).Path).Entries.FullName
          foreach ($required in 'profile.ps1', 'host.json', 'requirements.psd1') {
              if ($entries -notcontains $required) {
                  throw "function-app.zip is missing required file: $required"
              }
          }
          if (-not ($entries | Where-Object { $_ -like 'Modules/*' })) {
              throw "function-app.zip is missing the Modules/ directory"
          }
          if (-not ($entries | Where-Object { $_ -like 'functions/*' })) {
              throw "function-app.zip is missing the functions/ directory"
          }
          Write-Host "function-app.zip structure verified: $($entries.Count) entries" -ForegroundColor Green

      - name: Stage solution zip for release attachment
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION -replace '^v', ''
          Copy-Item "./deploy/solution-staging/XdrLogRaider/Package/$version.zip" `
              "./xdrlograider-solution-$version.zip"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: xdrlograider-sbom.spdx.json
          output-file: ./xdrlograider-sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            function-app.zip
            deploy/compiled/mainTemplate.json
            deploy/compiled/sentinelContent.json
            deploy/compiled/createUiDefinition.json
            xdrlograider-solution-*.zip
            xdrlograider-sbom.spdx.json
          body: |
            ## XdrLogRaider ${{ github.ref_name }}

            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Assets
            - `function-app.zip` — Function App code (PowerShell 7.4)
            - `mainTemplate.json` — ARM template for one-click deploy
            - `sentinelContent.json` — Nested ARM deployment for parsers, workbooks, analytic rules, hunting queries
            - `createUiDefinition.json` — Azure Portal wizard UI
            - `xdrlograider-solution-*.zip` — Sentinel Solution package (Content Hub-ready)
            - `xdrlograider-sbom.spdx.json` — SPDX SBOM (supply-chain transparency)

            ### Deploy to Azure

            [![Deploy to Azure](https://aka.ms/deploytoazurebutton)](https://portal.azure.com/#create/Microsoft.Template/uri/https%3A%2F%2Fgithub.com%2F${{ github.repository }}%2Freleases%2Fdownload%2F${{ github.ref_name }}%2FmainTemplate.json/createUIDefinitionUri/https%3A%2F%2Fgithub.com%2F${{ github.repository }}%2Freleases%2Fdownload%2F${{ github.ref_name }}%2FcreateUiDefinition.json)

            See README for post-deploy helper instructions.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
