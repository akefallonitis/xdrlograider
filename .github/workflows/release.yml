name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Gate — lint + unit + validate must pass
        shell: pwsh
        run: |
          # Lint each tree individually — older PSScriptAnalyzer versions on
          # the Ubuntu runner reject -Path with a string array. Loop + accumulate.
          # -ErrorAction Continue: PSSA occasionally throws non-fatal internal
          # NullReferenceException ("dynamic module" parser warnings) on Linux
          # runners that should not fail the release. We gate on actual
          # Error-severity findings, matching CI behavior (ci.yml:46).
          $allFindings = @()
          foreach ($p in @('./src', './tools', './tests')) {
              $allFindings += Invoke-ScriptAnalyzer -Path $p -Recurse -Settings './.config/PSScriptAnalyzerSettings.psd1' -ErrorAction Continue
          }
          $errs = $allFindings | Where-Object Severity -eq 'Error'
          if ($errs) {
              $errs | Format-Table -AutoSize
              throw "PSScriptAnalyzer errors — release aborted"
          }

          # Use the proven Run-Tests.ps1 driver (identical to CI + local).
          pwsh -NoProfile -File ./tests/Run-Tests.ps1 -Category all-offline
          if ($LASTEXITCODE -ne 0) { throw "Offline gate failed (exit $LASTEXITCODE)" }

      - name: Release-gate — no removed-stream references leak into artefacts
        shell: pwsh
        run: |
          # v0.1.0-beta.1 introduces a grep-gate: any mention of removed stream
          # names in deploy/compiled/* or sentinel/* fails the release. History
          # is documented in docs/STREAMS-REMOVED.md + CHANGELOG.md.
          $removedStreams = @(
              'MDE_AsrRulesConfig_CL',         # v1.0.2 NO_PUBLIC_API
              'MDE_AntiRansomwareConfig_CL',   # v1.0.2 NO_PUBLIC_API
              'MDE_ControlledFolderAccess_CL', # v1.0.2 NO_PUBLIC_API
              'MDE_NetworkProtectionConfig_CL',# v1.0.2 NO_PUBLIC_API
              'MDE_ApprovalAssignments_CL',    # v1.0.2 NO_PUBLIC_API
              'MDE_CriticalAssets_CL',         # v0.1.0-beta.1 WRITE endpoint
              'MDE_DeviceCriticality_CL'       # v0.1.0-beta.1 WRITE endpoint
          )
          $grepPaths = @('./deploy/compiled', './sentinel')
          $leaks = @()
          foreach ($p in $grepPaths) {
              foreach ($removed in $removedStreams) {
                  $found = Select-String -Path "$p/**/*" -Pattern $removed -SimpleMatch -ErrorAction SilentlyContinue
                  foreach ($f in $found) {
                      $leaks += "$($f.Path):$($f.LineNumber) → $removed"
                  }
              }
          }
          if ($leaks.Count -gt 0) {
              Write-Host "Removed-stream references leaked into release artefacts:" -ForegroundColor Red
              $leaks | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              throw "Release aborted — grep-gate failed. Add removed-stream history to docs/STREAMS-REMOVED.md only."
          }
          Write-Host "✓ Release-gate grep clean — 0 removed-stream refs in deploy/compiled + sentinel" -ForegroundColor Green

      - name: Release-gate — DCR stream count = 47 + all rules enabled:false + Data Connector 46 tables
        shell: pwsh
        run: |
          # v0.1.0-beta gate triad (belt + suspenders on top of preflight):
          #   (1) mainTemplate.json DCR.streamDeclarations.Count == 47
          #       (46 data streams + 1 operational Heartbeat; AuthTestResult retired)
          #   (2) every Microsoft.OperationalInsights/workspaces/savedSearches-Scheduled
          #       rule in sentinelContent.json has properties.enabled: false
          #   (3) Data Connector card dataTypes.Count == 46
          # These catch regressions that preflight covers but release workflow
          # would otherwise skip on tagged builds.

          # ---- Gate 1: DCR streamDeclarations count ----
          $mainTemplate = Get-Content ./deploy/compiled/mainTemplate.json -Raw | ConvertFrom-Json
          $dcrs = $mainTemplate.resources | Where-Object { $_.type -eq 'Microsoft.Insights/dataCollectionRules' }
          $streamCount = 0
          foreach ($dcr in $dcrs) {
              if ($dcr.properties.streamDeclarations) {
                  $streamCount += ($dcr.properties.streamDeclarations.PSObject.Properties.Name).Count
              }
          }
          if ($streamCount -ne 47) {
              throw "Gate 1 FAIL: DCR streamDeclarations count = $streamCount (expected 47 = 46 data + Heartbeat operational)"
          }
          Write-Host "Gate 1 OK: DCR streamDeclarations.Count = $streamCount" -ForegroundColor Green

          # ---- Gate 2: all analytic rules enabled:false ----
          $content = Get-Content ./deploy/compiled/sentinelContent.json -Raw | ConvertFrom-Json
          $scheduled = $content.resources | Where-Object {
              $_.type -match 'savedSearches' -and $_.kind -eq 'Scheduled'
          }
          $enabledTrue = $scheduled | Where-Object {
              $_.properties.enabled -ne $false -and $_.properties.enabled -eq $true
          }
          if ($enabledTrue) {
              throw "Gate 2 FAIL: $($enabledTrue.Count) rule(s) ship enabled:true. Microsoft Sentinel best practice: ship disabled, customer enables after review."
          }
          Write-Host "Gate 2 OK: 0 analytic rules ship enabled:true" -ForegroundColor Green

          # ---- Gate 3: Data Connector dataTypes count ----
          $dc = Get-Content './deploy/solution/Data Connectors/XdrLogRaider_DataConnector.json' -Raw | ConvertFrom-Json
          $dtCount = @($dc.dataTypes).Count
          if ($dtCount -ne 46) {
              throw "Gate 3 FAIL: Data Connector lists $dtCount dataTypes (expected 46 = 45 active streams + Heartbeat; deprecated stream excluded; AuthTestResult retired). Regenerate via tools/Build-SentinelSolution.ps1."
          }
          Write-Host "Gate 3 OK: Data Connector dataTypes.Count = $dtCount" -ForegroundColor Green

      - name: Build Sentinel content ARM (sentinelContent.json)
        shell: pwsh
        run: |
          pwsh -File ./tools/Build-SentinelContent.ps1
          if (-not (Test-Path ./deploy/compiled/sentinelContent.json)) {
              throw "Build-SentinelContent.ps1 did not produce sentinelContent.json"
          }
          Write-Host "✓ Sentinel content built" -ForegroundColor Green

      - name: Build Sentinel Solution package
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from tag (v1.0.0 → 1.0.0)
          $version = $env:VERSION -replace '^v', ''
          pwsh -File ./tools/Build-SentinelSolution.ps1 -Version $version
          $zipPath = "./deploy/solution-staging/XdrLogRaider/Package/$version.zip"
          if (-not (Test-Path $zipPath)) {
              throw "Build-SentinelSolution.ps1 did not produce $zipPath"
          }
          Write-Host "✓ Solution package built: $zipPath" -ForegroundColor Green

      - name: Build Function App ZIP (with bundled Az modules per Linux Consumption Legion)
        shell: pwsh
        run: |
          # CRITICAL — Two invariants this step must enforce:
          #
          #  (1) FLAT structure: function dirs (heartbeat-5m, poll-*, etc.)
          #      must be at the zip ROOT, NOT under a `functions/` wrapper.
          #      Azure Functions PowerShell runtime walks the root for
          #      function.json discovery.
          #
          #  (2) BUNDLED Az modules: requirements.psd1 must be empty + Az.*
          #      modules must ship pre-installed under Modules/. Linux
          #      Consumption "Legion" runtime does NOT support Managed
          #      Dependencies (every function load throws "Failed to install
          #      function app dependencies"). Microsoft official guidance:
          #      https://aka.ms/functions-powershell-include-modules
          #      Same approach is also required by Flex Consumption (v0.2.0
          #      migration target), so this work isn't temporary.
          #
          # Stage to a temp dir with canonical flat layout + Save-Module Az.*,
          # prune docs/help post-Save-Module (~30% size reduction), then zip.

          $stage = Join-Path $env:RUNNER_TEMP 'func-app-zip-build'
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          # === STAGE: src/* → $stage/ (flatten) ===

          # Root-level config + custom Modules/ (Xdr.Common.Auth, Xdr.Sentinel.Ingest,
          # Xdr.Defender.Auth, Xdr.Defender.Client, Xdr.Connector.Orchestrator,
          # plus the Xdr.Portal.Auth + XdrLogRaider.Client + XdrLogRaider.Ingest shims).
          Copy-Item ./src/host.json, ./src/profile.ps1, ./src/requirements.psd1 -Destination $stage
          Copy-Item ./src/Modules -Destination (Join-Path $stage 'Modules') -Recurse

          # FLATTEN: src/functions/<name>/  →  $stage/<name>/
          $funcDirs = Get-ChildItem -Path ./src/functions -Directory
          if (-not $funcDirs) { throw 'No function directories under ./src/functions — aborting zip build' }
          foreach ($fd in $funcDirs) {
              Copy-Item -Path $fd.FullName -Destination (Join-Path $stage $fd.Name) -Recurse
          }
          Write-Host ("Staged: {0} function dirs + custom Modules/ + config files" -f $funcDirs.Count) -ForegroundColor Cyan

          # === BUNDLE: Save-Module Az.{Accounts,KeyVault,Storage} → $stage/Modules/ ===
          # MinimumVersion (not RequiredVersion) so we get latest patch within the
          # major version line at build time — security updates flow through.
          # If a pinned-version build is needed for compliance, switch to
          # -RequiredVersion <semver>.

          $modulesDir = Join-Path $stage 'Modules'
          Write-Host "Saving Az modules into $modulesDir ..." -ForegroundColor Cyan

          # PSGallery is the source. Trust required to suppress prompts.
          if ((Get-PSRepository -Name PSGallery).InstallationPolicy -ne 'Trusted') {
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          }

          # CRITICAL: pin EXACT versions, not MinimumVersion. MinimumVersion =
          # floating dependency hell where each release silently picks a
          # different snapshot — breaks reproducibility.
          #
          # Iter 13.15: AzTable + Az.Resources REMOVED.
          # Storage Table entity ops are now handled by the unified
          # Invoke-XdrStorageTableEntity helper (System.Net.Http.HttpClient +
          # Get-AzAccessToken -ResourceUrl https://storage.azure.com/) which
          # honors Managed Identity auth natively without depending on the
          # AzTable community module's Microsoft.Azure.Cosmos.Table SDK
          # (which did NOT reliably propagate MI tokens — root cause of
          # iter-13.13 + iter-13.14 production breakages).
          #
          # Az.Storage 7.5.0 retained: still useful for blob/queue ops and
          # for the test scaffolding that creates SDK-style contexts. No
          # runtime dependency on its table cmdlets.
          $azModules = @(
              @{ Name = 'Az.Accounts';  RequiredVersion = '5.3.4' }
              @{ Name = 'Az.KeyVault';  RequiredVersion = '6.4.3' }
              @{ Name = 'Az.Storage';   RequiredVersion = '7.5.0' }
          )
          foreach ($m in $azModules) {
              Save-Module -Name $m.Name -RequiredVersion $m.RequiredVersion -Path $modulesDir -Repository PSGallery -Force
              Write-Host "  ✓ $($m.Name) saved (= $($m.RequiredVersion))" -ForegroundColor Green
          }

          # === PRUNE: remove docs/help/samples from Az modules (size optimization) ===
          # Docs ship with PSGallery packages but are not needed at runtime; safe
          # to remove. Estimated reduction: 25-40% of the bundled module weight.
          $beforePrune = (Get-ChildItem -Path $modulesDir -Recurse -File | Measure-Object Length -Sum).Sum

          $prunePatterns = @('*.md', '*.txt', '*.html', '*.cdxml', 'samples', 'docs')
          # Help XML files are heavy and not needed in production: en-US/*.xml
          # patterns. Remove them while preserving .psd1/.psm1/.dll/.ps1.
          foreach ($pat in $prunePatterns) {
              Get-ChildItem -Path $modulesDir -Recurse -Force -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -like $pat -or $_.Name -ieq $pat } |
                  Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }
          # Remove en-US/*-help.xml (heavy, runtime not used)
          Get-ChildItem -Path $modulesDir -Recurse -Filter '*-Help.xml' -ErrorAction SilentlyContinue |
              Remove-Item -Force -ErrorAction SilentlyContinue

          $afterPrune = (Get-ChildItem -Path $modulesDir -Recurse -File | Measure-Object Length -Sum).Sum
          $savedMB = [int](($beforePrune - $afterPrune) / 1MB)
          $totalMB = [int]($afterPrune / 1MB)
          Write-Host "Module pruning: saved $savedMB MB; total Modules/ = $totalMB MB" -ForegroundColor Cyan

          # === ZIP: Compress-Archive from $stage root ===
          Push-Location $stage
          $relItems = Get-ChildItem -Exclude 'local.settings.json*' |
              Select-Object -ExpandProperty Name
          Compress-Archive -Path $relItems -DestinationPath "$env:GITHUB_WORKSPACE/function-app.zip" -Force
          Pop-Location

          $size = (Get-Item ./function-app.zip).Length
          $zipMB = [int]($size / 1MB)

          # === SIZE BUDGET GATE ===
          # Bundled Az modules with pruning compress ~3:1 via Compress-Archive
          # deflate. Empirical: 54 MB raw Modules/ → 18 MB zip. Pre-iter-13 zip
          # (no Az bundle) was 67 KB. So:
          #   < 10 MB: definitely missing Az modules → re-trigger Legion bug.
          #   > 100 MB: unintended trees leaked (huge regression).
          if ($zipMB -lt 10) {
              throw "function-app.zip is only $zipMB MB — too small. Save-Module probably failed; Az modules missing. Aborting."
          }
          if ($zipMB -gt 100) {
              throw "function-app.zip is $zipMB MB — exceeds 100 MB budget. Suggests unintended trees in zip; investigate."
          }
          Write-Host "function-app.zip: $zipMB MB (within 10-100 MB budget)" -ForegroundColor Green

          # === VERIFY: post-build assertions on zip structure ===
          $entries = [IO.Compression.ZipFile]::OpenRead((Resolve-Path ./function-app.zip).Path).Entries.FullName

          # 1. Required root-level files
          foreach ($required in 'profile.ps1', 'host.json', 'requirements.psd1') {
              if ($entries -notcontains $required) {
                  throw "function-app.zip is missing required root file: $required"
              }
          }
          # 2. Modules/ directory must exist at root
          if (-not ($entries | Where-Object { $_ -like 'Modules/*' })) {
              throw "function-app.zip is missing the Modules/ directory"
          }
          # 3. NO `functions/` wrapper (Azure runtime requirement)
          if ($entries | Where-Object { $_ -like 'functions/*' }) {
              throw "function-app.zip has a 'functions/' wrapper. Function directories MUST be at root for Azure Functions runtime to load them."
          }
          # 4. All 6 expected function dirs at root with function.json.
          # 5 cadence-tier polls (fast/exposure/config/inventory/maintenance) +
          # the heartbeat-5m operational timer.
          $expectedFuncs = @(
              'heartbeat-5m',
              'poll-fast-10m','poll-exposure-1h','poll-config-6h',
              'poll-inventory-1d','poll-maintenance-1w'
          )
          foreach ($func in $expectedFuncs) {
              if ($entries -notcontains "$func/function.json") {
                  throw "function-app.zip is missing required function: $func/function.json (must be at root, not under functions/)"
              }
              if ($entries -notcontains "$func/run.ps1") {
                  throw "function-app.zip is missing $func/run.ps1"
              }
          }
          # 5. No development artefacts (the .example file or local.settings.json)
          if ($entries | Where-Object { $_ -like 'local.settings.json*' }) {
              throw "function-app.zip contains a local.settings.json* file (dev artefact must not ship)"
          }
          # 6. Az.* modules bundled (Legion fix invariant) — at least one .psd1 manifest each.
          # Iter 13.15: AzTable + Az.Resources removed; Storage Table ops now use
          # System.Net.Http.HttpClient via Invoke-XdrStorageTableEntity helper.
          foreach ($azMod in 'Az.Accounts', 'Az.KeyVault', 'Az.Storage') {
              $manifest = $entries | Where-Object { $_ -match "^Modules/$azMod/[\d\.]+/$azMod\.psd1$" } | Select-Object -First 1
              if (-not $manifest) {
                  throw "function-app.zip is missing bundled $azMod (Modules/$azMod/<version>/$azMod.psd1). Save-Module failed or pruning was too aggressive."
              }
              Write-Host "  ✓ Bundled module: $manifest" -ForegroundColor Green
          }
          # 6b. Iter 13.15 negative-bundle gate: AzTable + Az.Resources MUST NOT
          # be present in the zip (we explicitly removed them; ensures no stale
          # cache or accidental re-add reintroduces the iter-13.13/14 bug class).
          foreach ($removedMod in 'AzTable', 'Az.Resources') {
              $stale = $entries | Where-Object { $_ -match "^Modules/$removedMod/" } | Select-Object -First 1
              if ($stale) {
                  throw "function-app.zip contains $removedMod ($stale) — iter-13.15 removed this module. The Storage Table HttpClient helper replaces it."
              }
          }
          Write-Host "  ✓ AzTable + Az.Resources confirmed NOT bundled (iter-13.15 transition)" -ForegroundColor Green
          # 7. requirements.psd1 must NOT have module references (Legion fix invariant)
          $reqContent = Get-Content "$env:GITHUB_WORKSPACE/src/requirements.psd1" -Raw
          if ($reqContent -match "(?m)^\s*'Az\." -or $reqContent -match "(?m)^\s*Az\." ) {
              throw "src/requirements.psd1 still has Az module references — must be empty. Linux Consumption Legion will fail to load functions."
          }

          Write-Host "function-app.zip structure verified: $($entries.Count) entries, $($expectedFuncs.Count) function dirs at root, 3 Az modules bundled, requirements.psd1 module-free, no dev artefacts" -ForegroundColor Green

      - name: Stage solution zip for release attachment
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $version = $env:VERSION -replace '^v', ''
          Copy-Item "./deploy/solution-staging/XdrLogRaider/Package/$version.zip" `
              "./xdrlograider-solution-$version.zip"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        continue-on-error: true  # SBOM upload is nice-to-have; do not block release
        with:
          path: .
          format: spdx-json
          artifact-name: xdrlograider-sbom.spdx.json
          output-file: ./xdrlograider-sbom.spdx.json
          upload-artifact: false       # disable implicit artifact upload (needs extra perms)
          upload-release-assets: false  # we attach it ourselves via softprops below

      - name: Guarantee SBOM file exists (fallback stub)
        shell: pwsh
        if: always()
        run: |
          # If the SBOM action was skipped/failed, emit a minimal SPDX stub so the
          # release asset manifest stays stable (operators can still verify the zip).
          if (-not (Test-Path ./xdrlograider-sbom.spdx.json)) {
              $stub = @{
                  spdxVersion  = 'SPDX-2.3'
                  dataLicense  = 'CC0-1.0'
                  SPDXID       = 'SPDXRef-DOCUMENT'
                  name         = 'xdrlograider-sbom (stub)'
                  documentNamespace = "https://github.com/akefallonitis/xdrlograider/sbom/$(New-Guid)"
                  creationInfo = @{ created = (Get-Date).ToString('o'); creators = @('Tool: manual-stub') }
                  note         = 'SBOM generation was skipped or failed; release still valid. See workflow logs.'
              } | ConvertTo-Json -Depth 5
              Set-Content -Path ./xdrlograider-sbom.spdx.json -Value $stub
              Write-Host "Emitted SBOM stub (sbom-action failed)" -ForegroundColor Yellow
          } else {
              Write-Host "SBOM file present: $((Get-Item ./xdrlograider-sbom.spdx.json).Length) bytes" -ForegroundColor Green
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            function-app.zip
            deploy/compiled/mainTemplate.json
            deploy/compiled/sentinelContent.json
            deploy/compiled/createUiDefinition.json
            xdrlograider-solution-*.zip
            xdrlograider-sbom.spdx.json
          body: |
            ## XdrLogRaider ${{ github.ref_name }}

            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Assets
            - `function-app.zip` — Function App code (PowerShell 7.4)
            - `mainTemplate.json` — ARM template for one-click deploy
            - `sentinelContent.json` — Nested ARM deployment for parsers, workbooks, analytic rules, hunting queries
            - `createUiDefinition.json` — Azure Portal wizard UI
            - `xdrlograider-solution-*.zip` — Sentinel Solution package (Content Hub-ready)
            - `xdrlograider-sbom.spdx.json` — SPDX SBOM (supply-chain transparency)

            ### Deploy to Azure

            [![Deploy to Azure](https://aka.ms/deploytoazurebutton)](https://portal.azure.com/#create/Microsoft.Template/uri/https%3A%2F%2Fraw.githubusercontent.com%2F${{ github.repository }}%2F${{ github.ref_name }}%2Fdeploy%2Fcompiled%2FmainTemplate.json/createUIDefinitionUri/https%3A%2F%2Fraw.githubusercontent.com%2F${{ github.repository }}%2F${{ github.ref_name }}%2Fdeploy%2Fcompiled%2FcreateUiDefinition.json)

            > **Note on the button URL**: Azure Portal's XHR blocks CORS on
            > `github.com/.../releases/download/...` URLs (they return
            > `Content-Disposition: attachment` without `Access-Control-Allow-Origin`).
            > The button above instead uses `raw.githubusercontent.com` pointing at
            > the same file content committed at the tag — this is the same pattern
            > Microsoft's own Azure-Sentinel Solutions repo uses. The release assets
            > attached to this page remain valid for direct download / inspection.

            See README for post-deploy helper instructions.
          draft: false
          # CRITICAL: prerelease MUST stay false (even for -beta / -rc tags).
          # mainTemplate.json variables.packageUrl tracks
          # /releases/latest/download/function-app.zip — GitHub's /latest
          # endpoint SKIPS pre-releases and returns 404, which leaves the
          # Function App's WEBSITE_RUN_FROM_PACKAGE pointing at a 404 → cold
          # start fails silently → zero polls fire → no telemetry.
          # The "-beta" suffix in the tag name is sufficient operator signal;
          # we do NOT need GitHub's prerelease=true flag, which conflicts with
          # the /releases/latest packageUrl simplification in v0.1.0-beta.
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
